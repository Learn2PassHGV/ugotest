<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta (updated per-route at runtime and by the prerender step) -->
    <title>UGO | Premium Coach & Minibus Hire | Nationwide Transport</title>
    <meta name="description" content="Family-run premium coach and minibus hire based in St Albans. Executive unbranded fleet for corporate travel, schools, weddings, film productions and airport transfers across Hertfordshire, London and the UK." />
    <link rel="canonical" href="https://www.coaches.business/" />

    <!-- Icons -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph / social sharing -->
    <meta property="og:site_name" content="UGO Coach & Minibus Hire" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="UGO | Premium Coach & Minibus Hire | Nationwide Transport" />
    <meta property="og:description" content="Family-run premium coach and minibus hire based in St Albans. Executive unbranded fleet for corporate travel, schools, weddings and events." />
    <meta property="og:url" content="https://www.coaches.business/" />
    <meta property="og:image" content="https://www.coaches.business/og-image.jpg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts: preconnect + single stylesheet request -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Organisation / LocalBusiness structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "@id": "https://www.coaches.business/#business",
      "name": "UGO Coach & Minibus Hire",
      "legalName": "Pullman Direct Ltd",
      "url": "https://www.coaches.business/",
      "telephone": "+448458333456",
      "email": "sasha@coaches.business",
      "image": "https://www.coaches.business/og-image.jpg",
      "priceRange": "££",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Wellington House, 273-275 High Street, London Colney",
        "addressLocality": "St Albans",
        "addressRegion": "Hertfordshire",
        "postalCode": "AL2 1HA",
        "addressCountry": "GB"
      },
      "geo": { "@type": "GeoCoordinates", "latitude": 51.726, "longitude": -0.3037 },
      "openingHoursSpecification": [{
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"],
        "opens": "08:00",
        "closes": "18:00"
      }],
      "areaServed": ["St Albans","Watford","Hemel Hempstead","Luton","Greater London","Hertfordshire","Bedfordshire","Buckinghamshire","United Kingdom"],
      "description": "Family-run premium coach and minibus hire. Executive unbranded fleet from 16-seat minibuses to 53-seat coaches for corporate travel, schools, weddings, film productions and airport transfers."
    }
    </script>

    <!--
      Analytics: paste the GA4 tag here at launch (see README "Analytics").
      Left out intentionally until the client's GA4 property ID exists.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
